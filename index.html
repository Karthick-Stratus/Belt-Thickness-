<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belt Thickness Dashboard | Manufacturing Analytics</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly.js CDN -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2pdf.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f1f5f9;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        .gradient-text {
            background: linear-gradient(135deg, #818cf8, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #818cf8;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #fff;
        }
        /* Plotly Custom Styling */
        .js-plotly-plot .plotly .modebar {
            top: 2px !important;
            right: 2px !important;
        }
        /* Print/PDF Specific Styles */
        @media print {
            .no-print { display: none !important; }
            .glass-card { border: none; background: white; color: black; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">

    <!-- Header Section -->
    <header class="w-full mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="bg-indigo-600 p-2 rounded-xl">
                <i data-lucide="factory" class="w-8 h-8 text-white"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold gradient-text">Belt Thickness Dashboard</h1>
                <p class="text-slate-400 text-sm">Industrial Analytics & Quality Control</p>
            </div>
        </div>
        <div class="flex flex-wrap justify-center gap-3 no-print">
            <button onclick="downloadPDF()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg transition-all duration-200 shadow-lg shadow-emerald-900/20">
                <i data-lucide="file-text" class="w-4 h-4"></i>
                <span>Download PDF Report</span>
            </button>
            <button onclick="resetDashboard()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-all duration-200">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                <span>Reset View</span>
            </button>
            <a href="https://github.com/Karthick-Stratus/Belt-Thickness-" target="_blank" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition-all duration-200">
                <i data-lucide="github" class="w-4 h-4"></i>
                <span>Source</span>
            </a>
        </div>
    </header>

    <main id="dashboard-content" class="w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Controls Sidebar -->
        <aside class="lg:col-span-3 space-y-6 no-print">
            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 border-b border-slate-700 pb-2">
                    <i data-lucide="settings-2" class="w-5 h-5 text-indigo-400"></i>
                    Configurations
                </h2>
                
                <!-- Chart Type Selector -->
                <div class="mb-6">
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Display Mode</label>
                    <select id="chartType" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        <option value="line">Line Chart + Markers</option>
                        <option value="markers">Scatter Plot Only</option>
                        <option value="bar">Distribution Bar</option>
                    </select>
                </div>

                <!-- Zoom Controls -->
                <div class="mb-6">
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Manual Zoom</label>
                    <div class="flex gap-2">
                        <button onclick="changeZoom(1.2)" class="flex-1 bg-slate-800 hover:bg-slate-700 p-2 rounded-lg border border-slate-700 transition-colors" title="Zoom In">
                            <i data-lucide="zoom-in" class="w-5 h-5 mx-auto"></i>
                        </button>
                        <button onclick="changeZoom(0.8)" class="flex-1 bg-slate-800 hover:bg-slate-700 p-2 rounded-lg border border-slate-700 transition-colors" title="Zoom Out">
                            <i data-lucide="zoom-out" class="w-5 h-5 mx-auto"></i>
                        </button>
                    </div>
                </div>

                <!-- Moving Average Slider -->
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-semibold text-slate-500 uppercase">Trend Window</label>
                        <span id="maValue" class="text-indigo-400 font-bold bg-indigo-400/10 px-2 py-0.5 rounded text-xs">10</span>
                    </div>
                    <input type="range" id="maSlider" min="2" max="50" value="10" 
                           class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer custom-slider">
                </div>

                <!-- Visibility Toggles -->
                <div class="space-y-3">
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">Data Layers</label>
                    <label class="flex items-center cursor-pointer group p-2 hover:bg-slate-800/50 rounded-lg transition-colors">
                        <input type="checkbox" id="toggleRaw" checked class="sr-only peer">
                        <div class="w-10 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600 relative"></div>
                        <span class="ml-3 text-sm font-medium group-hover:text-indigo-400 transition-colors">Raw Data</span>
                    </label>
                    <label class="flex items-center cursor-pointer group p-2 hover:bg-slate-800/50 rounded-lg transition-colors">
                        <input type="checkbox" id="toggleMA" checked class="sr-only peer">
                        <div class="w-10 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500 relative"></div>
                        <span class="ml-3 text-sm font-medium group-hover:text-emerald-400 transition-colors">Moving Average</span>
                    </label>
                    <label class="flex items-center cursor-pointer group p-2 hover:bg-slate-800/50 rounded-lg transition-colors">
                        <input type="checkbox" id="toggleEnvelopes" checked class="sr-only peer">
                        <div class="w-10 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-rose-500 relative"></div>
                        <span class="ml-3 text-sm font-medium group-hover:text-rose-400 transition-colors">Envelope Curves</span>
                    </label>
                </div>
            </div>

            <!-- Stats Summary -->
            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 border-b border-slate-700 pb-2">
                    <i data-lucide="activity" class="w-5 h-5 text-emerald-400"></i>
                    Performance
                </h2>
                <div class="grid grid-cols-1 gap-3">
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 flex justify-between items-center">
                        <span class="text-xs text-slate-400 uppercase">Total Samples</span>
                        <span id="statTotal" class="text-xl font-bold text-white">0</span>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 flex justify-between items-center">
                        <span class="text-xs text-slate-400 uppercase">Arithmetic Mean</span>
                        <span id="statAvg" class="text-xl font-bold text-white text-emerald-400">0.000</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                            <p class="text-[10px] text-slate-500 uppercase mb-1">Max</p>
                            <p id="statMax" class="text-lg font-bold text-white">0.000</p>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                            <p class="text-[10px] text-slate-500 uppercase mb-1">Min</p>
                            <p id="statMin" class="text-lg font-bold text-white">0.000</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Charts Main View -->
        <div class="lg:col-span-9 space-y-6">
            <!-- Run Chart -->
            <div class="glass-card p-4 min-h-[550px] flex flex-col">
                <div class="flex justify-between items-center mb-2 px-2">
                    <h3 class="text-sm font-medium text-slate-400 uppercase tracking-widest">Temporal Thickness Analysis</h3>
                    <div class="flex gap-2">
                        <span class="w-3 h-3 rounded-full bg-indigo-500"></span>
                        <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                        <span class="w-3 h-3 rounded-full bg-rose-500"></span>
                    </div>
                </div>
                <div id="mainChart" class="w-full flex-grow"></div>
            </div>
            
            <!-- Frequency Chart -->
            <div class="glass-card p-4 min-h-[400px] flex flex-col">
                <h3 class="text-sm font-medium text-slate-400 uppercase tracking-widest mb-2 px-2 text-center">Value Concentration Histogram</h3>
                <div id="freqChart" class="w-full flex-grow"></div>
            </div>
        </div>
    </main>

    <footer class="w-full mt-10 pb-6 text-center text-slate-500 text-xs border-t border-slate-800/50 pt-6 no-print">
        <p>Report Generated on <span id="currentDate"></span> | System Proprietary Data</p>
    </footer>

    <script>
        // Set current date
        document.getElementById('currentDate').innerText = new Date().toLocaleString();

        // --- Core Data Payload ---
        const thicknessData = [1.084, 1.078, 1.101, 1.09, 1.087, 1.082, 1.096, 1.074, 1.065, 1.082, 1.062, 1.083, 1.094, 1.103, 1.058, 1.101, 1.053, 1.099, 1.075, 1.092, 1.104, 1.101, 1.101, 1.071, 1.095, 1.085, 1.067, 1.126, 1.094, 1.093, 1.071, 1.075, 1.069, 1.082, 1.098, 1.089, 1.089, 1.071, 1.088, 1.061, 1.082, 1.069, 1.086, 1.085, 1.05, 1.094, 1.062, 1.089, 1.062, 1.079, 1.079, 1.062, 1.089, 1.05, 1.083, 1.062, 1.071, 1.087, 1.055, 1.085, 1.101, 1.079, 1.075, 1.07, 1.095, 1.053, 1.088, 1.078, 1.061, 1.09, 1.093, 1.045, 1.092, 1.077, 1.088, 1.092, 1.036, 1.095, 1.079, 1.089, 1.074, 1.069, 1.09, 1.078, 1.088, 1.062, 1.073, 1.083, 1.084, 1.094, 1.076, 1.061, 1.056, 1.083, 1.102, 1.089, 1.086, 1.085, 1.086, 1.093, 1.043, 1.088, 1.091, 1.085, 1.103, 1.071, 1.093, 1.069, 1.083, 1.06, 1.079, 1.122, 1.088, 1.1, 1.059, 1.073, 1.06, 1.09, 1.083, 1.09, 1.085, 1.071, 1.082, 1.082, 1.094, 1.094, 1.069, 1.109, 1.059, 1.097, 1.071, 1.089, 1.094, 1.084, 1.082, 1.089, 1.101, 1.071, 1.084, 1.063, 1.069, 1.07, 1.087, 1.082, 1.062, 1.07, 1.077, 1.071, 1.069, 1.065, 1.09, 1.062, 1.087, 1.057, 1.084, 1.06, 1.079, 1.098, 1.051, 1.085, 1.058, 1.09, 1.08, 1.079, 1.09, 1.039, 1.106];

        const sampleNumbers = thicknessData.map((_, i) => i + 1);

        // --- Helper Functions ---
        
        function calculateMA(data, window) {
            let result = [];
            for (let i = 0; i < data.length; i++) {
                let start = Math.max(0, i - window + 1);
                let subset = data.slice(start, i + 1);
                let avg = subset.reduce((a, b) => a + b) / subset.length;
                result.push(avg);
            }
            return result;
        }

        function calculateEnvelopes(data, window) {
            let upper = [];
            let lower = [];
            for (let i = 0; i < data.length; i++) {
                let start = Math.max(0, i - window + 1);
                let subset = data.slice(start, i + 1);
                upper.push(Math.max(...subset));
                lower.push(Math.min(...subset));
            }
            return { upper, lower };
        }

        function getFrequencyData(data) {
            const counts = {};
            data.forEach(val => {
                counts[val] = (counts[val] || 0) + 1;
            });
            const sortedEntries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            return {
                x: sortedEntries.map(e => e[0]),
                y: sortedEntries.map(e => e[1])
            };
        }

        // --- UI Update logic ---
        
        function updateStats() {
            document.getElementById('statTotal').innerText = thicknessData.length;
            document.getElementById('statAvg').innerText = (thicknessData.reduce((a, b) => a + b) / thicknessData.length).toFixed(4);
            document.getElementById('statMax').innerText = Math.max(...thicknessData).toFixed(3);
            document.getElementById('statMin').innerText = Math.min(...thicknessData).toFixed(3);
        }

        // --- PDF Generation ---
        function downloadPDF() {
            const element = document.getElementById('dashboard-content');
            const opt = {
                margin:       [0.5, 0.5, 0.5, 0.5],
                filename:     'Belt_Thickness_Report.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#0f172a', useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
            };

            // Temporarily show a loading state
            const btn = document.querySelector('button[onclick="downloadPDF()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Processing...';
            lucide.createIcons();

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = originalText;
                lucide.createIcons();
            });
        }

        // --- Zoom Control ---
        function changeZoom(factor) {
            const chart = document.getElementById('mainChart');
            const currentRange = chart.layout.xaxis.range || [1, thicknessData.length];
            const center = (currentRange[0] + currentRange[1]) / 2;
            const newHalfWidth = ((currentRange[1] - currentRange[0]) / 2) / factor;
            
            Plotly.relayout('mainChart', {
                'xaxis.range': [center - newHalfWidth, center + newHalfWidth],
                'yaxis.autorange': true
            });
        }

        // --- Chart Initialization ---

        function initCharts() {
            lucide.createIcons();
            updateStats();

            const maWindow = parseInt(document.getElementById('maSlider').value);
            const chartMode = document.getElementById('chartType').value;
            
            const movingAverage = calculateMA(thicknessData, maWindow);
            const envelopes = calculateEnvelopes(thicknessData, maWindow);
            const freq = getFrequencyData(thicknessData);

            const rawTrace = {
                x: sampleNumbers,
                y: thicknessData,
                mode: chartMode === 'line' ? 'lines+markers' : chartMode,
                type: chartMode === 'bar' ? 'bar' : 'scatter',
                name: 'Raw Thickness',
                line: { color: '#818cf8', width: 1.5 },
                marker: { color: '#818cf8', size: 4 },
                visible: document.getElementById('toggleRaw').checked
            };

            const maTrace = {
                x: sampleNumbers,
                y: movingAverage,
                mode: 'lines',
                name: `MA Trend`,
                line: { color: '#10b981', width: 3, shape: 'spline' },
                visible: document.getElementById('toggleMA').checked
            };

            const upperTrace = {
                x: sampleNumbers,
                y: envelopes.upper,
                mode: 'lines',
                name: 'Upper Boundary',
                line: { color: '#f43f5e', width: 1, dash: 'dot' },
                visible: document.getElementById('toggleEnvelopes').checked
            };

            const lowerTrace = {
                x: sampleNumbers,
                y: envelopes.lower,
                mode: 'lines',
                name: 'Lower Boundary',
                line: { color: '#f43f5e', width: 1, dash: 'dot' },
                visible: document.getElementById('toggleEnvelopes').checked,
                fill: 'tonexty',
                fillcolor: 'rgba(244, 63, 94, 0.03)'
            };

            const mainLayout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                xaxis: { title: 'Sample Number', gridcolor: '#1e293b', color: '#64748b' },
                yaxis: { title: 'mm', gridcolor: '#1e293b', color: '#64748b' },
                legend: { font: { color: '#94a3b8', size: 10 }, orientation: 'h', y: -0.2 },
                margin: { t: 10, r: 10, l: 40, b: 50 },
                hovermode: 'x unified',
                template: 'plotly_dark'
            };

            Plotly.newPlot('mainChart', [rawTrace, maTrace, upperTrace, lowerTrace], mainLayout, { 
                responsive: true,
                displaylogo: false,
                modeBarButtonsToRemove: ['select2d', 'lasso2d']
            });

            const freqTrace = {
                x: freq.x,
                y: freq.y,
                type: 'bar',
                marker: {
                    color: freq.y,
                    colorscale: [[0, '#312e81'], [1, '#818cf8']],
                },
                hovertemplate: 'Val: %{x}mm<br>Freq: %{y}<extra></extra>'
            };

            const freqLayout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                xaxis: { title: 'Thickness (mm)', type: 'category', gridcolor: '#1e293b', color: '#64748b' },
                yaxis: { title: 'Count', gridcolor: '#1e293b', color: '#64748b' },
                margin: { t: 10, r: 10, l: 40, b: 40 },
                template: 'plotly_dark'
            };

            Plotly.newPlot('freqChart', [freqTrace], freqLayout, { responsive: true, displaylogo: false });
        }

        function handleUpdates() {
            const maWindow = parseInt(document.getElementById('maSlider').value);
            document.getElementById('maValue').innerText = maWindow;
            
            const chartMode = document.getElementById('chartType').value;
            const movingAverage = calculateMA(thicknessData, maWindow);
            const envelopes = calculateEnvelopes(thicknessData, maWindow);

            Plotly.restyle('mainChart', {
                mode: chartMode === 'line' ? 'lines+markers' : chartMode,
                type: chartMode === 'bar' ? 'bar' : 'scatter',
                visible: document.getElementById('toggleRaw').checked
            }, [0]);

            Plotly.restyle('mainChart', {
                y: [movingAverage],
                visible: document.getElementById('toggleMA').checked
            }, [1]);

            Plotly.restyle('mainChart', {
                y: [envelopes.upper],
                visible: document.getElementById('toggleEnvelopes').checked
            }, [2]);

            Plotly.restyle('mainChart', {
                y: [envelopes.lower],
                visible: document.getElementById('toggleEnvelopes').checked
            }, [3]);
        }

        function resetDashboard() {
            document.getElementById('maSlider').value = 10;
            document.getElementById('chartType').value = 'line';
            document.getElementById('toggleRaw').checked = true;
            document.getElementById('toggleMA').checked = true;
            document.getElementById('toggleEnvelopes').checked = true;
            initCharts();
        }

        document.getElementById('maSlider').addEventListener('input', handleUpdates);
        document.getElementById('chartType').addEventListener('change', handleUpdates);
        document.getElementById('toggleRaw').addEventListener('change', handleUpdates);
        document.getElementById('toggleMA').addEventListener('change', handleUpdates);
        document.getElementById('toggleEnvelopes').addEventListener('change', handleUpdates);

        window.onload = initCharts;
    </script>
</body>
</html>
